<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b0f19"/>
      <stop offset="100%" style="stop-color:#12051a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e50914"/>
      <stop offset="100%" style="stop-color:#ff4d4d"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
  </g>

  <!-- Red glow circle -->
  <circle cx="600" cy="315" r="280" fill="rgba(229,9,20,0.06)" filter="url(#glow)"/>

  <!-- Red accent bar -->
  <rect x="80" y="275" width="5" height="80" fill="url(#accent)" rx="3"/>

  <!-- Brand name -->
  <text
    x="110" y="345"
    font-family="'Arial Black', 'Helvetica Neue', sans-serif"
    font-size="96"
    font-weight="900"
    letter-spacing="6"
    fill="#ffffff"
  >NEXTLOOK</text>

  <!-- Tagline -->
  <text
    x="110" y="398"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="28"
    font-weight="400"
    letter-spacing="1"
    fill="rgba(255,255,255,0.6)"
  >Background Verification Simplified</text>

  <!-- Bottom domain -->
  <text
    x="110" y="560"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="20"
    fill="rgba(229,9,20,0.8)"
    letter-spacing="1"
  >nextlook.com</text>

  <!-- Decorative dots -->
  <circle cx="1080" cy="200" r="3" fill="rgba(229,9,20,0.5)"/>
  <circle cx="1100" cy="220" r="2" fill="rgba(229,9,20,0.3)"/>
  <circle cx="1060" cy="230" r="4" fill="rgba(229,9,20,0.2)"/>
  <circle cx="1090" cy="250" r="2" fill="rgba(229,9,20,0.4)"/>
  <circle cx="1110" cy="180" r="3" fill="rgba(229,9,20,0.3)"/>
</svg>
